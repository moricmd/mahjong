  <!-- 開発用　ログインを行わない-->

    <!-- タイトル画面 -->
    <div id="title-screen" class="screen">
      <h1>Mahjong Game</h1>
      <button id="start-btn">スタート</button>
    </div>

    <!-- メニュー画面（CPU戦のみ） -->
    <div id="menu-screen" class="screen">
      <h2>モード選択</h2>
      <button id="cpu-mode">CPU戦</button>
    </div>


  
  
<!-- ゲーム画面 
  --------------------------------------------------------------------------------------------------------------------->
<div id="game-screen" class="screen">
  

  <div id="top-left-info">
    <div class="dora-area">
      <div class="dora-title">ドラ</div>
      <div id="dora-indicators" class="dora-tiles"></div>
    </div>

    <div class="counter-area">
      <div class="counter-row">
        <img src="img/立直棒.png" class="counter-icon">
        <span class="counter-text">× <span id="honba-count">0</span></span>
        <img src="img/積み棒.png" class="counter-icon">
        <span class="counter-text">× <span id="kyotaku-count">0</span></span>
      </div>
    </div>

    <div class="mode-info">
      <span id="play-mode">CPU戦</span>
    </div>
  </div>



  <div id="table">

    <div id="table-info">
  <div class="side-info top">
    <div class="wind-box cpu" id="wind-top"></div>
    <div class="score-box cpu" id="score-top"></div>
  </div>

  <div class="side-info left">
    <div class="wind-box cpu" id="wind-left"></div>
    <div class="score-box cpu" id="score-left"></div>
  </div>

  <div class="center-info">
    <div id="round-display">東1局</div>
    <div id="wall-count">70</div>
  </div>

  <div class="side-info right">
    <div class="wind-box cpu" id="wind-right"></div>
    <div class="score-box cpu" id="score-right"></div>
  </div>

  <div class="side-info bottom">
    <div class="wind-box player" id="wind-bottom"></div>
    <div class="score-box player" id="score-bottom"></div>
  </div>
</div>


    
  </div>

    <div id="player-hand" class="hand-area"></div>
    <div id="discards-0" class="discard-area"></div>

    <div id="cpu1-hand" class="hand-area"></div>
    <div id="discards-1" class="discard-area"></div>

    <div id="cpu2-hand" class="hand-area"></div>
    <div id="discards-2" class="discard-area"></div>


  <div>
    <button id="next-btn">次の処理へ</button>
    <button id="auto-sort-btn">自動整理：OFF</button>
  </div>
</div>


  <script type="module" src="js/main.js"></script>

</body>
</html>
