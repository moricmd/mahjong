<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>三人麻雀プロトタイプ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>sanma</h1>

  <div>状態: <span id="state"></span></div>
  <div>巡目: <span id="turn"></span></div>

<div id="table">

  <div id="cpu1-hand" class="hand cpu-hand"></div>
  <div id="cpu1-discards" class="discards cpu-discards"></div>

  <div id="cpu2-hand" class="hand cpu-hand"></div>
  <div id="cpu2-discards" class="discards cpu-discards"></div>

  <div id="player-hand" class="hand player-hand"></div>
  <div id="player-discards" class="discards player-discards"></div>

</div>

<div>
  <button id="next-btn">次の処理へ</button>
  <button id="auto-sort-btn">自動整理：OFF</button>
</div>


  <script type="module" src="js/main.js"></script>

</body>
</html>
